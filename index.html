<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS Outreach — Daily 50</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F4F4F4; color: #111; }

.header { background: #fff; border-bottom: 1px solid #E0E0E0; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
.header h1 { font-size: 17px; font-weight: 700; }
.header .sub { font-size: 11px; color: #999; margin-top: 2px; }
.hdr-right { display: flex; gap: 8px; align-items: center; }

.btn { font-size: 12px; padding: 7px 14px; border-radius: 7px; border: none; cursor: pointer; font-weight: 500; }
.btn-dark { background: #111; color: #fff; }
.btn-dark:disabled { opacity: 0.4; cursor: default; }
.btn-outline { background: #fff; color: #333; border: 1px solid #D0D0D0; }

.main { max-width: 900px; margin: 0 auto; padding: 20px 16px; }

.cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 18px; }
.card { background: #fff; border-radius: 9px; padding: 12px 14px; border: 1px solid #E5E5E5; }
.card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-bottom: 3px; }
.card-value { font-size: 24px; font-weight: 700; line-height: 1.1; }
.card-sub { font-size: 10px; color: #aaa; margin-top: 3px; }

.filters { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.pill { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: none; cursor: pointer; background: #E8E8E8; color: #555; }
.pill.active { background: #111; color: #fff; font-weight: 600; }

.list { display: flex; flex-direction: column; gap: 7px; }

.clinic-card { background: #fff; border: 1px solid #E5E5E5; border-radius: 10px; overflow: hidden; }
.clinic-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; user-select: none; }
.clinic-row:hover { background: #FAFAFA; }
.num { font-size: 11px; color: #ccc; min-width: 20px; text-align: right; flex-shrink: 0; }
.badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.clinic-info { flex: 1; min-width: 0; }
.clinic-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.clinic-sub { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.clinic-right { text-align: right; flex-shrink: 0; min-width: 90px; }
.clinic-days { font-size: 13px; font-weight: 700; }
.clinic-ltv { font-size: 10px; color: #aaa; }
.chevron { font-size: 10px; color: #ccc; flex-shrink: 0; }

/* Detail panel */
.detail { display: none; border-top: 1px solid #F0F0F0; }
.detail.open { display: block; }
.detail-inner { padding: 16px; background: #FAFAFA; }

.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.detail-section { margin-bottom: 14px; }
.dl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: #aaa; margin-bottom: 6px; font-weight: 600; }

/* Spend bar */
.spend-row { display: flex; gap: 10px; margin-bottom: 14px; }
.spend-box { flex: 1; background: #fff; border: 1px solid #E8E8E8; border-radius: 8px; padding: 10px 12px; text-align: center; }
.spend-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
.spend-value { font-size: 16px; font-weight: 700; color: #111; }
.spend-delta { font-size: 11px; margin-top: 2px; }
.up { color: #1D9E75; } .down { color: #C0392B; }

/* Product tables */
.prod-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.prod-table th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #aaa; padding: 0 0 6px; border-bottom: 1px solid #EEE; }
.prod-table td { padding: 7px 0; border-bottom: 1px solid #F5F5F5; vertical-align: top; }
.prod-table td:last-child { text-align: right; white-space: nowrap; }
.prod-name { font-weight: 500; color: #111; line-height: 1.4; }
.prod-meta { font-size: 11px; color: #888; margin-top: 1px; }
.lost { color: #C0392B; font-weight: 600; }
.active-tag { color: #1D9E75; font-weight: 600; }

/* Contact info */
.contact-chips { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: #666; margin-bottom: 14px; }
.contact-chips span { display: flex; align-items: center; gap: 4px; }

/* Rep badge */
.rep-badge { display: inline-block; font-size: 11px; background: #EEF2FF; color: #3730A3; padding: 2px 8px; border-radius: 6px; font-weight: 500; margin-bottom: 10px; }

/* Email draft */
.email-section { background: #fff; border: 1px solid #E8E8E8; border-radius: 8px; padding: 14px; margin-top: 14px; }
.email-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.etab { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid #E0E0E0; cursor: pointer; background: #fff; }
.etab.active { background: #111; color: #fff; border-color: #111; }
.email-subject { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 8px; }
.email-body { font-size: 13px; color: #333; white-space: pre-wrap; line-height: 1.7; background: #FAFAFA; border-radius: 6px; padding: 12px; border: 1px solid #F0F0F0; }
.copy-btn { margin-top: 10px; font-size: 11px; padding: 5px 12px; cursor: pointer; border-radius: 6px; border: 1px solid #D0D0D0; background: #fff; }
.copy-btn:hover { background: #F5F5F5; }

/* Loading / error */
.loading { text-align: center; padding: 4rem; color: #999; font-size: 14px; }
.error-box { background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 10px; padding: 16px; color: #991B1B; font-size: 13px; }
.footer { text-align: center; font-size: 11px; color: #ccc; margin-top: 20px; padding-bottom: 40px; }

@media (max-width: 640px) {
  .cards { grid-template-columns: repeat(3, 1fr); }
  .detail-grid { grid-template-columns: 1fr; }
  .spend-row { flex-wrap: wrap; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>PetScript — Daily Outreach</h1>
    <div class="sub" id="dateStr"></div>
  </div>
  <div class="hdr-right">
    <button class="btn btn-outline" id="rerollBtn" onclick="reroll()" style="display:none">↺ Re-roll</button>
    <button class="btn btn-dark" id="refreshBtn" onclick="load()">↻ Refresh</button>
  </div>
</div>

<div class="main">

  <div class="cards" id="cards" style="display:none">
    <div class="card"><div class="card-label">Total today</div><div class="card-value" id="cTotal">—</div><div class="card-sub" id="cPool"></div></div>
    <div class="card"><div class="card-label">Never ordered</div><div class="card-value" style="color:#C0392B" id="cNever">—</div><div class="card-sub">priority 1</div></div>
    <div class="card"><div class="card-label">Gone dark 90d+</div><div class="card-value" style="color:#B7770D" id="cDark">—</div><div class="card-sub">priority 2</div></div>
    <div class="card"><div class="card-label">Lapsed 45–90d</div><div class="card-value" style="color:#1A5CA8" id="cLapsed">—</div><div class="card-sub">priority 3</div></div>
    <div class="card"><div class="card-label">Dropped SKU</div><div class="card-value" style="color:#6B21A8" id="cDropped">—</div><div class="card-sub">priority 4</div></div>
  </div>

  <div class="filters" id="filters" style="display:none">
    <button class="pill active" onclick="setFilter('all')" data-f="all">All</button>
    <button class="pill" onclick="setFilter('never')" data-f="never">Never ordered</button>
    <button class="pill" onclick="setFilter('dark')" data-f="dark">Gone dark</button>
    <button class="pill" onclick="setFilter('lapsed')" data-f="lapsed">Lapsed</button>
    <button class="pill" onclick="setFilter('dropped')" data-f="dropped">Dropped SKU</button>
  </div>

  <div id="stateLoading" class="loading">Loading clinic data…<br><small style="color:#bbb;font-size:12px;display:block;margin-top:8px">Parsing data server-side, takes a few seconds</small></div>
  <div id="stateError" class="error-box" style="display:none"><strong>Error:</strong> <span id="errMsg"></span><br><button class="btn btn-outline" style="margin-top:10px" onclick="load()">Retry</button></div>

  <div class="list" id="clinicList" style="display:none"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
const WORKER = "https://50clinicoutreach.jp-d4e.workers.dev";

const META = {
  never:   { label:"Never ordered",   color:"#C0392B", bg:"#FDECEA" },
  dark:    { label:"Gone dark 90d+",  color:"#B7770D", bg:"#FEF3CD" },
  lapsed:  { label:"Lapsed 45–90d",   color:"#1A5CA8", bg:"#E8F0FD" },
  dropped: { label:"Dropped SKU",     color:"#6B21A8", bg:"#F3E8FF" },
};

let allClinics = [], currentFilter = "all";

document.getElementById("dateStr").textContent = new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});

async function load() {
  show("loading");
  document.getElementById("refreshBtn").disabled = true;
  try {
    const res = await fetch(`${WORKER}/outreach?t=${Date.now()}`);
    if (!res.ok) throw new Error(`Worker returned ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allClinics = data.clinics;
    document.getElementById("cTotal").textContent   = data.clinics.length;
    document.getElementById("cPool").textContent    = `${(data.total_eligible||0).toLocaleString()} eligible`;
    document.getElementById("cNever").textContent   = data.counts?.never   || 0;
    document.getElementById("cDark").textContent    = data.counts?.dark    || 0;
    document.getElementById("cLapsed").textContent  = data.counts?.lapsed  || 0;
    document.getElementById("cDropped").textContent = data.counts?.dropped || 0;
    document.getElementById("footer").textContent   = `Last synced: ${new Date(data.generated_at).toLocaleString()}`;
    updatePills(data.clinics);
    show("ready");
    renderList(currentFilter);
  } catch(e) {
    document.getElementById("errMsg").textContent = e.message;
    show("error");
  }
  document.getElementById("refreshBtn").disabled = false;
}

function updatePills(clinics) {
  const cnt = {all:clinics.length,never:0,dark:0,lapsed:0,dropped:0};
  clinics.forEach(c => { if(cnt[c.bucket]!==undefined) cnt[c.bucket]++; });
  document.querySelectorAll(".pill").forEach(p => {
    const f = p.dataset.f;
    p.textContent = f==="all" ? `All (${cnt.all})` : `${META[f]?.label||f} (${cnt[f]||0})`;
  });
}

function reroll() {
  allClinics = [...allClinics].sort(()=>Math.random()-0.5);
  renderList(currentFilter);
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll(".pill").forEach(p => p.classList.toggle("active", p.dataset.f===f));
  renderList(f);
}

function fmt(n) { return Number(n||0).toLocaleString("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}); }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function renderList(filter) {
  const list = filter==="all" ? allClinics : allClinics.filter(c=>c.bucket===filter);
  const el = document.getElementById("clinicList");
  el.innerHTML = "";
  if (!list.length) { el.style.display="none"; return; }
  el.style.display = "flex";
  list.forEach((c,i) => {
    const m = META[c.bucket]||META.never;
    const div = document.createElement("div");
    div.className = "clinic-card";
    div.innerHTML = `
      <div class="clinic-row" onclick="toggle(${c.idx})">
        <div class="num">${i+1}</div>
        <div class="badge" style="background:${m.bg};color:${m.color}">${m.label}</div>
        <div class="clinic-info">
          <div class="clinic-name">${esc(c.name)}</div>
          <div class="clinic-sub">${esc(c.repName||"—")} · ${esc(c.contact||"—")}${c.email?" · "+esc(c.email):""}</div>
        </div>
        <div class="clinic-right">
          ${c.daysSinceLast!=null
            ? `<div class="clinic-days" style="color:${m.color}">${c.daysSinceLast}d ago</div>`
            : `<div class="clinic-days" style="color:#bbb">no orders</div>`}
          ${c.spend>0?`<div class="clinic-ltv">${fmt(c.spend)} LTV</div>`:""}
        </div>
        <div class="chevron" id="chev-${c.idx}">▼</div>
      </div>
      <div class="detail" id="detail-${c.idx}">
        <div class="detail-inner">
          ${buildDetail(c,m)}
        </div>
      </div>`;
    el.appendChild(div);
  });
}

function buildDetail(c, m) {
  const ytdDelta = c.lastYtdSpend > 0 ? ((c.ytdSpend - c.lastYtdSpend)/c.lastYtdSpend*100).toFixed(0) : null;
  const deltaHtml = ytdDelta!==null
    ? `<div class="spend-delta ${ytdDelta>=0?"up":"down"}">${ytdDelta>=0?"▲":"▼"} ${Math.abs(ytdDelta)}% vs last year</div>`
    : `<div class="spend-delta" style="color:#aaa">No prior year data</div>`;

  let html = `
    ${c.repName ? `<div class="rep-badge">Rep: ${esc(c.repName)}</div>` : ""}

    <div class="contact-chips">
      ${c.phone   ? `<span>📞 ${esc(c.phone)}</span>`   : ""}
      ${c.email   ? `<span>✉️ ${esc(c.email)}</span>`   : ""}
      ${c.address ? `<span>📍 ${esc(c.address)}</span>` : ""}
      ${c.lastOrderDate ? `<span>🗓 Last order: ${c.lastOrderDate}</span>` : ""}
    </div>

    <div class="spend-row">
      <div class="spend-box"><div class="spend-label">YTD Spend</div><div class="spend-value">${fmt(c.ytdSpend)}</div>${deltaHtml}</div>
      <div class="spend-box"><div class="spend-label">Last Year YTD</div><div class="spend-value">${fmt(c.lastYtdSpend)}</div></div>
      <div class="spend-box"><div class="spend-label">Last 6 Months</div><div class="spend-value">${fmt(c.sixMoSpend)}</div></div>
      <div class="spend-box"><div class="spend-label">Lifetime</div><div class="spend-value">${fmt(c.spend)}</div></div>
    </div>`;

  // Why here
  html += `<div class="detail-section"><div class="dl">Why they're here</div>
    <div style="font-size:13px;color:#444;background:#fff;border:1px solid #EEE;border-radius:8px;padding:10px 12px;line-height:1.6">${buildReason(c)}</div>
  </div>`;

  // Dropped products
  if (c.droppedProducts?.length) {
    html += `<div class="detail-section"><div class="dl">Stopped ordering (${c.droppedProducts.length} products)</div>
      <table class="prod-table">
        <thead><tr><th>Product</th><th>Orders</th><th>Last ordered</th><th>Lost revenue</th></tr></thead>
        <tbody>`;
    c.droppedProducts.slice(0,8).forEach(p => {
      html += `<tr>
        <td><div class="prod-name">${esc(p.productName)}</div></td>
        <td style="color:#888">${p.orderCount}</td>
        <td style="color:#888;white-space:nowrap">${p.lastOrderDate} (${p.daysSince}d ago)</td>
        <td class="lost">${fmt(p.totalSpend)}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  // Active products
  if (c.activeProducts?.length) {
    html += `<div class="detail-section"><div class="dl">Still ordering (${c.activeProducts.length} products)</div>
      <table class="prod-table">
        <thead><tr><th>Product</th><th>Orders</th><th>Last ordered</th><th>YTD spend</th></tr></thead>
        <tbody>`;
    c.activeProducts.slice(0,6).forEach(p => {
      html += `<tr>
        <td><div class="prod-name">${esc(p.productName)}</div></td>
        <td style="color:#888">${p.orderCount}</td>
        <td style="color:#888;white-space:nowrap">${p.lastOrderDate}</td>
        <td class="active-tag">${fmt(p.ytdSpend)}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  // Email drafts
  html += buildEmailSection(c);

  return html;
}

function buildReason(c) {
  if (c.bucket==="never") return "In your system but has never placed a compounding order with PetScript.";
  if (c.bucket==="dark")  return `Last order <strong>${c.daysSinceLast} days ago</strong> (${c.lastOrderDate}). Lifetime value: ${fmt(c.spend)}. Has completely stopped ordering.`;
  if (c.bucket==="lapsed") return `Last order <strong>${c.daysSinceLast} days ago</strong> (${c.lastOrderDate}). Ordering cadence has stalled. ${fmt(c.sixMoSpend)} in last 6 months vs ${fmt(c.lastYtdSpend)} last year YTD.`;
  if (c.bucket==="dropped") {
    const top = c.droppedProducts?.[0];
    return top ? `Still ordering overall but dropped <strong>${esc(top.productName)}</strong> ${top.daysSince} days ago — ${fmt(top.totalSpend)} in lost revenue.` : "Still ordering but has dropped specific products they previously ordered.";
  }
  return "";
}

function buildEmailSection(c) {
  const first = (c.contact||"there").split(" ")[0];
  const topDropped = c.droppedProducts?.[0];

  const emails = {
    a: {
      label: "Check-in A",
      subject: `${c.name} — quick check-in`,
      body: buildEmailA(c, first, topDropped),
    },
    b: {
      label: "Check-in B",
      subject: `Still compounding ${topDropped ? topDropped.productName.split(" ").slice(0,3).join(" ")+"?" : "with us?"}`,
      body: buildEmailB(c, first, topDropped),
    },
    c: {
      label: "Win-back",
      subject: `We want your business back — ${c.name}`,
      body: buildEmailC(c, first, topDropped),
    },
  };

  let html = `<div class="email-section">
    <div class="dl" style="margin-bottom:10px">Draft emails</div>
    <div class="email-tabs">
      <button class="etab active" onclick="switchTab('${c.idx}','a',this)">Check-in A</button>
      <button class="etab" onclick="switchTab('${c.idx}','b',this)">Check-in B</button>
      <button class="etab" onclick="switchTab('${c.idx}','c',this)">Win-back</button>
    </div>`;

  Object.entries(emails).forEach(([key, email]) => {
    html += `<div id="email-${c.idx}-${key}" style="display:${key==="a"?"block":"none"}">
      <div class="email-subject">Subject: ${esc(email.subject)}</div>
      <div class="email-body" id="body-${c.idx}-${key}">${esc(email.body)}</div>
      <button class="copy-btn" onclick="copyEmail('${c.idx}','${key}','${esc(email.subject)}')">📋 Copy email</button>
    </div>`;
  });

  html += `</div>`;
  return html;
}

function buildEmailA(c, first, top) {
  const lines = [`Hey ${first},`,""];
  if (c.bucket==="never") {
    lines.push("You're set up with PetScript but we haven't filled anything for you yet — wanted to make sure nothing fell through the cracks.");
    lines.push("","What are you currently sourcing for compounded medications? I can usually turn around pricing same day.");
  } else if (c.bucket==="dark" || c.bucket==="lapsed") {
    lines.push(`It's been ${c.daysSinceLast} days since your last order — just checking in to make sure everything is good on your end.`);
    lines.push("","Did something change, or can I help get you resupplied?");
  } else if (top) {
    lines.push(`Noticed it's been ${top.daysSince} days since your last order of ${top.productName}.`);
    lines.push("","Did you find another source, or is there something I can do on pricing or formulation?");
  }
  lines.push("","JP","PetScript Pharmacy","jp@petscript.net");
  return lines.join("\n");
}

function buildEmailB(c, first, top) {
  const lines = [`Hey ${first},`,""];
  if (c.bucket==="never") {
    lines.push("Quick question — what compounded medications are you ordering most right now?");
    lines.push("","I'd love to send over pricing. We typically ship same or next day and I can usually beat what you're paying elsewhere.");
  } else if (top) {
    lines.push(`Saw you've been ordering ${top.productName} in the past (${top.orderCount} orders). Haven't seen a recent order — are you still stocking it?`);
    lines.push("","Happy to lock in pricing or adjust the formulation if needed.");
  } else {
    lines.push(`Wanted to touch base — it's been ${c.daysSinceLast} days since your last order. Are you still compounding with us?`);
    lines.push("","Let me know what you're running low on and I'll get it moving.");
  }
  lines.push("","JP","PetScript Pharmacy");
  return lines.join("\n");
}

function buildEmailC(c, first, top) {
  const lines = [`Hey ${first},`,""];
  lines.push(`I noticed your orders from PetScript have slowed down${top ? ` — specifically ${top.productName}` : ""}. I wanted to reach out personally.`);
  lines.push("","If pricing, turnaround, or formulation is the issue I can fix it. We've been compounding for over 20 years and I'd rather earn your business back than lose it.");
  lines.push("","Can we get on a quick call this week?");
  lines.push("","JP","PetScript Pharmacy","jp@petscript.net | 501-555-0100");
  return lines.join("\n");
}

function switchTab(clinicIdx, tab, btn) {
  const panel = document.getElementById(`detail-${clinicIdx}`);
  panel.querySelectorAll(".etab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  ["a","b","c"].forEach(k => {
    const el = document.getElementById(`email-${clinicIdx}-${k}`);
    if (el) el.style.display = k===tab ? "block" : "none";
  });
}

function copyEmail(clinicIdx, tab, subject) {
  const body = document.getElementById(`body-${clinicIdx}-${tab}`)?.textContent || "";
  const full = `Subject: ${subject}\n\n${body}`;
  navigator.clipboard.writeText(full).then(() => alert("Copied to clipboard!")).catch(() => alert("Select and copy manually."));
}

function toggle(idx) {
  const detail = document.getElementById(`detail-${idx}`);
  const chev   = document.getElementById(`chev-${idx}`);
  const isOpen = detail.classList.contains("open");
  document.querySelectorAll(".detail.open").forEach(d => {
    d.classList.remove("open");
    const c = document.getElementById(`chev-${d.id.replace("detail-","")}`);
    if (c) c.textContent = "▼";
  });
  if (!isOpen) { detail.classList.add("open"); chev.textContent = "▲"; }
}

function show(s) {
  document.getElementById("stateLoading").style.display = s==="loading" ? "block" : "none";
  document.getElementById("stateError").style.display   = s==="error"   ? "block" : "none";
  document.getElementById("cards").style.display        = s==="ready"   ? "grid"  : "none";
  document.getElementById("filters").style.display      = s==="ready"   ? "flex"  : "none";
  document.getElementById("clinicList").style.display   = s==="ready"   ? "flex"  : "none";
